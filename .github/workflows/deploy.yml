name: SampahKu CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DOCKER_IMAGE_BACKEND: sampahku-backend
  DOCKER_IMAGE_FRONTEND: sampahku-frontend

jobs:
  # ============================================
  # JOB 1: TEST & BUILD
  # ============================================
  test-and-build:
    name: 🧪 Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🔍 Lint check
        working-directory: ./backend
        run: |
          echo "Running basic syntax check..."
          node --check server.js
          node --check db.js
          echo "✅ Syntax check passed"

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Backend Docker image (test)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ${{ env.DOCKER_IMAGE_BACKEND }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔨 Build Frontend Docker image (test)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: ${{ env.DOCKER_IMAGE_FRONTEND }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Build successful
        run: echo "🎉 Both images built successfully!"

  # ============================================
  # JOB 2: DEPLOY KE EC2
  # ============================================
  deploy:
    name: 🚀 Deploy to EC2
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/sampahku.pem
          chmod 600 ~/.ssh/sampahku.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 📂 Copy files to EC2
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.env' \
            -e "ssh -i ~/.ssh/sampahku.pem" \
            ./ ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/sampahku/

      - name: 🔧 Create .env file on EC2
        run: |
          ssh -i ~/.ssh/sampahku.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          cat > /home/ubuntu/sampahku/.env << ENVFILE
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_SSL=true
          AWS_REGION=${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          NODE_ENV=production
          ENVFILE
          echo "✅ .env file created"
          EOF

      - name: 🐳 Deploy dengan Docker Compose
        run: |
          ssh -i ~/.ssh/sampahku.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          cd /home/ubuntu/sampahku

          echo "📥 Pulling / building images..."
          docker compose pull 2>/dev/null || true
          docker compose build --no-cache

          echo "⏹️ Stopping old containers..."
          docker compose down --remove-orphans

          echo "🚀 Starting new containers..."
          docker compose up -d

          echo "⏳ Waiting for health check..."
          sleep 15

          echo "🔍 Checking container status..."
          docker compose ps

          echo "📋 Backend logs (last 20):"
          docker compose logs backend --tail=20

          echo "✅ Deployment complete!"
          EOF

      - name: 🏥 Health Check
        run: |
          sleep 10
          echo "Testing API health..."
          response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}/api/health || echo "000")
          echo "HTTP Status: $response"
          if [ "$response" = "200" ]; then
            echo "✅ Health check passed!"
          else
            echo "⚠️ Health check returned: $response (app may still be starting)"
          fi

      - name: 🎉 Deployment Summary
        run: |
          echo "=================================="
          echo "✅ SampahKu deployed successfully!"
          echo "🌐 URL: http://${{ secrets.EC2_HOST }}"
          echo "📅 Time: $(date)"
          echo "📦 Commit: ${{ github.sha }}"
          echo "=================================="

  # ============================================
  # JOB 3: NOTIFY (opsional)
  # ============================================
  notify:
    name: 📣 Notify
    needs: deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📊 Deployment status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment BERHASIL pada $(date)"
            echo "🌐 Akses di: http://${{ secrets.EC2_HOST }}"
          else
            echo "❌ Deployment GAGAL pada $(date)"
            echo "📋 Cek logs di GitHub Actions"
          fi
